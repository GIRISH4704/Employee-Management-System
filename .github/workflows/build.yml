# This workflow runs on every push to main and every pull request targeting main.
# It compiles the Spring Boot backend to catch broken code early.

name: Java CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # GitHub spins up a fresh Ubuntu VM for each run
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repo code onto the VM
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Java 17 (Temurin = Eclipse's free OpenJDK build)
      # 'distribution' is required in setup-java@v4 — Temurin is the standard choice
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'          # caches ~/.m2 between runs → faster builds

      # Step 3: Compile the backend
      # working-directory points Maven at the subfolder containing pom.xml
      - name: Compile with Maven
        working-directory: employee-management
        run: mvn compile --batch-mode

      # Step 4: Run unit tests (Mockito tests — no DB needed)
      # -Dtest= runs only our unit test, skipping the @SpringBootTest that needs MySQL
      - name: Run unit tests
        working-directory: employee-management
        run: mvn test --batch-mode -Dtest=EmployeeServiceTest
